version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: primetrade_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: primetrade_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - primetrade_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: primetrade_backend
    environment:
      PORT: 5000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/primetrade_db
      JWT_ACCESS_SECRET: your-super-secret-jwt-access-key-change-in-production-12345
      JWT_REFRESH_SECRET: your-super-secret-jwt-refresh-key-change-in-production-67890
      JWT_ACCESS_EXPIRES: 15m
      JWT_REFRESH_EXPIRES: 7d
      CORS_ORIGIN: http://localhost:5173
      NODE_ENV: development
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
    networks:
      - primetrade_network
    command: sh -c "npx prisma migrate deploy || npx prisma migrate dev --name init && npm run dev"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: primetrade_frontend
    environment:
      VITE_API_BASE_URL: http://localhost:5000/api/v1
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
    networks:
      - primetrade_network

volumes:
  postgres_data:
    driver: local

networks:
  primetrade_network:
    driver: bridge
