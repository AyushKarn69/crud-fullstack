<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Tasks Sign Up Screen</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0a89ff",
                        "background-light": "#f5f7f8",
                        "background-dark": "#0b1117",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .input-glow:focus {
            box-shadow: 0 0 0 4px rgba(10, 137, 255, 0.15);
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex items-center justify-center relative overflow-hidden">
<!-- Background Decor -->
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/10 rounded-full blur-[120px] pointer-events-none"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-[120px] pointer-events-none"></div>
<div class="layout-container flex h-full grow flex-col w-full max-w-[1200px] px-6 z-10">
<header class="flex items-center justify-between whitespace-nowrap px-4 py-8 md:px-10">
<div class="flex items-center gap-3 text-slate-900 dark:text-slate-100">
<div class="size-8 bg-primary rounded-lg flex items-center justify-center text-white">
<span class="material-symbols-outlined text-2xl">check_circle</span>
</div>
<h2 class="text-xl font-bold tracking-tight">Tasks</h2>
</div>
<div class="hidden md:block">
<p class="text-sm text-slate-500 dark:text-slate-400">
                    Already have an account? 
                    <a class="text-primary font-semibold hover:underline" href="#">Log In</a>
</p>
</div>
</header>
<main class="flex-1 flex flex-col items-center justify-center py-12">
<!-- Glassmorphic Card -->
<div class="glass-card w-full max-w-[480px] p-8 md:p-12 rounded-xl shadow-2xl">
<div class="flex flex-col gap-2 mb-10 text-center">
<h1 class="text-3xl font-extrabold tracking-tight text-slate-900 dark:text-white">Create Account</h1>
<p class="text-slate-500 dark:text-slate-400 text-base">Get started with the most powerful task manager.</p>
</div>
<form class="flex flex-col gap-6">
<!-- Full Name -->
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Full Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl">person</span>
<input class="w-full h-14 pl-12 pr-4 bg-white/5 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-800 rounded-xl text-slate-900 dark:text-white placeholder:text-slate-400 dark:placeholder:text-slate-600 focus:outline-none focus:border-primary input-glow transition-all" placeholder="John Doe" type="text"/>
</div>
</div>
<!-- Email -->
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl">mail</span>
<input class="w-full h-14 pl-12 pr-4 bg-white/5 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-800 rounded-xl text-slate-900 dark:text-white placeholder:text-slate-400 dark:placeholder:text-slate-600 focus:outline-none focus:border-primary input-glow transition-all" placeholder="name@example.com" type="email"/>
</div>
</div>
<!-- Password -->
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl">lock</span>
<input class="w-full h-14 pl-12 pr-12 bg-white/5 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-800 rounded-xl text-slate-900 dark:text-white placeholder:text-slate-400 dark:placeholder:text-slate-600 focus:outline-none focus:border-primary input-glow transition-all" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<!-- CTA Button -->
<button class="mt-4 w-full h-14 bg-primary hover:bg-primary/90 text-white font-bold rounded-xl transition-all shadow-lg shadow-primary/20 flex items-center justify-center gap-2" type="submit">
<span>Create Account</span>
<span class="material-symbols-outlined text-lg">arrow_forward</span>
</button>
</form>
<div class="mt-8 flex flex-col gap-6">
<div class="relative flex items-center">
<div class="flex-grow border-t border-slate-200 dark:border-slate-800"></div>
<span class="flex-shrink mx-4 text-xs font-medium text-slate-400 uppercase tracking-widest">Or sign up with</span>
<div class="flex-grow border-t border-slate-200 dark:border-slate-800"></div>
</div>
<div class="flex gap-4">
<button class="flex-1 h-12 flex items-center justify-center gap-2 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
<img alt="Google" class="w-5 h-5" data-alt="Google colorful G logo icon" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAgJxNNjPX-5qubzehRafSjhMrTsO_-rv9ucDkE-hmyhFn7Bhu6caS7gM1wBfUaFCsIjvwhjnhNQ-JAkrWyNQlqvnEtIBBl6V1WTY46bgt2Sy99NMZRrnNfVoRfih2rcClTqnvnG1zQAs0PxV3qWM4kMxP-Ld4IceuCM7aJiygBBTIjWDKWkYcKJrgN9VblHbmCQGIa1-5maBDA0v6TNqo3zBtbo2Vr-9wtPPnP6Vw5d5NDsgncS_10SbHJzwId5FMkTPcvIbOguw"/>
<span class="text-sm font-semibold">Google</span>
</button>
<button class="flex-1 h-12 flex items-center justify-center gap-2 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined text-xl">ios</span>
<span class="text-sm font-semibold">Apple</span>
</button>
</div>
</div>
<div class="mt-10 text-center md:hidden">
<p class="text-sm text-slate-500 dark:text-slate-400">
                        Already have an account? 
                        <a class="text-primary font-semibold hover:underline" href="#">Log In</a>
</p>
</div>
</div>
<!-- Footer links -->
<footer class="mt-12 flex flex-wrap justify-center gap-x-8 gap-y-2 text-xs font-medium text-slate-400 dark:text-slate-600">
<a class="hover:text-primary transition-colors" href="#">Privacy Policy</a>
<a class="hover:text-primary transition-colors" href="#">Terms of Service</a>
<a class="hover:text-primary transition-colors" href="#">Help Center</a>
<p>© 2024 Tasks Inc.</p>
</footer>
</main>
</div>
</body></html>
