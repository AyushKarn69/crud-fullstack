<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Tasks Login - Premium Minimalist</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0a85ff",
                        "background-light": "#f5f7f8",
                        "background-dark": "#0f1923",
                        "card-dark": "#1c1c1e",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .glass-card {
            background-color: rgba(28, 28, 30, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display flex items-center justify-center min-h-screen text-slate-900 dark:text-slate-100 overflow-hidden">
<!-- Decorative background elements for depth -->
<div class="fixed inset-0 z-0 overflow-hidden">
<div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] bg-primary/10 rounded-full blur-[120px]"></div>
<div class="absolute -bottom-[10%] -right-[10%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-[120px]"></div>
</div>
<main class="relative z-10 w-full max-w-[440px] px-6 py-12">
<div class="glass-card rounded-xl p-10 flex flex-col items-center shadow-2xl">
<!-- Logo & Title Section -->
<div class="flex flex-col items-center mb-10">
<div class="w-16 h-16 bg-primary rounded-xl flex items-center justify-center mb-6 shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-white text-4xl" data-icon="task_alt">task_alt</span>
</div>
<h1 class="text-3xl font-bold tracking-tight text-slate-900 dark:text-white">Tasks</h1>
<p class="text-slate-500 dark:text-slate-400 mt-2 text-sm font-medium">Elevate your productivity</p>
</div>
<!-- Login Form -->
<form class="w-full space-y-6" onsubmit="return false;">
<div class="space-y-2">
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300 ml-1" for="email">
                        Email
                    </label>
<div class="relative">
<input class="w-full h-12 px-4 bg-slate-100/50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none text-slate-900 dark:text-white placeholder:text-slate-400 dark:placeholder:text-slate-500" id="email" placeholder="name@example.com" type="email"/>
</div>
</div>
<div class="space-y-2">
<div class="flex justify-between items-center ml-1">
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300" for="password">
                            Password
                        </label>
<a class="text-xs font-medium text-primary hover:underline transition-all" href="#">Forgot Password?</a>
</div>
<div class="relative">
<input class="w-full h-12 px-4 bg-slate-100/50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none text-slate-900 dark:text-white placeholder:text-slate-400 dark:placeholder:text-slate-500" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<button class="w-full h-12 bg-primary hover:bg-primary/90 text-white font-semibold rounded-lg shadow-lg shadow-primary/25 transition-all flex items-center justify-center gap-2 group mt-4" type="submit">
                    Sign In
                    <span class="material-symbols-outlined text-lg group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Footer Section -->
<div class="mt-10 pt-8 border-t border-slate-200 dark:border-slate-800 w-full text-center">
<p class="text-slate-500 dark:text-slate-400 text-sm">
                    Don't have an account? 
                    <a class="text-primary font-semibold hover:underline ml-1" href="#">Sign Up</a>
</p>
</div>
</div>
<!-- Secondary footer links -->
<div class="mt-8 flex justify-center gap-6 text-xs font-medium text-slate-400 dark:text-slate-600">
<a class="hover:text-primary transition-colors" href="#">Privacy Policy</a>
<a class="hover:text-primary transition-colors" href="#">Terms of Service</a>
<a class="hover:text-primary transition-colors" href="#">Help Center</a>
</div>
</main>
<!-- Placeholder background image for visual richness -->
<div class="fixed inset-0 -z-10 opacity-20 pointer-events-none">
<div class="w-full h-full bg-center bg-no-repeat bg-cover" data-alt="Abstract deep blue and charcoal geometric pattern" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBvi6bA5-iErOTpb4jWMiMsSS1J6bENJfe1SufSN44acdafR-R9ZIJD8VUm-xwTIS2J5ovmVTXTiAHDgXQcPr61FsARGpZNKpE_tKkY0Gph-4I5UydiIaRyKRFT9YLa7denyx7InYXvWftz5NYdt0IxWHCOaOursZtt8eq3kWIH9xDbQUaBIJqnWJpv91nWIAUVwmodfDmQ5S1b5eOJuoVu3Cj2iQLq141PjOgY-StspZvPmwCC79hTfJAm3uSG0kd-7nd885HaIw');"></div>
</div>
</body></html>
