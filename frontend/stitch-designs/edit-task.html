<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Edit Task Modal View</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0A84FF",
                        "background-light": "#f7f5f8",
                        "background-dark": "#000000",
                        "surface-dark": "#1c1c1e",
                        "border-dark": "#38383A",
                        "text-secondary": "#ebebf599",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
</head>
<body class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen relative overflow-hidden">
<!-- Dashboard Background (Blurred) -->
<div class="absolute inset-0 z-0 opacity-40 filter blur-sm">
<div class="flex h-full flex-col">
<header class="flex items-center justify-between px-10 py-6 border-b border-border-dark">
<h1 class="text-3xl font-bold">Tasks</h1>
<div class="w-10 h-10 rounded-full bg-primary/20"></div>
</header>
<main class="flex-1 p-10 grid gap-4 grid-cols-1 md:grid-cols-2 lg:grid-cols-3">
<div class="h-32 rounded-xl bg-surface-dark border border-border-dark p-6"></div>
<div class="h-32 rounded-xl bg-surface-dark border border-border-dark p-6"></div>
<div class="h-32 rounded-xl bg-surface-dark border border-border-dark p-6"></div>
<div class="h-32 rounded-xl bg-surface-dark border border-border-dark p-6"></div>
</main>
</div>
</div>
<!-- Modal Overlay -->
<div class="absolute inset-0 z-10 flex items-center justify-center bg-black/40 backdrop-blur-md p-4">
<!-- Modal Content -->
<div class="bg-surface-dark border border-border-dark rounded-xl shadow-2xl w-full max-w-[560px] flex flex-col overflow-hidden">
<!-- Header -->
<div class="flex flex-wrap items-center justify-between px-6 py-5 border-b border-border-dark">
<h2 class="text-xl font-semibold tracking-tight">Edit Task</h2>
<button class="text-text-secondary hover:text-white transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- Form Body -->
<div class="p-6 flex flex-col gap-6 overflow-y-auto max-h-[70vh]">
<!-- Task Title -->
<div class="flex flex-col gap-2">
<label class="text-sm font-medium text-text-secondary">Task Title</label>
<input class="w-full bg-[#2c2c2e] border border-transparent rounded-lg px-4 py-3 text-white placeholder-text-secondary focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all" placeholder="What needs to be done?" type="text" value="Design new landing page"/>
</div>
<!-- Notes -->
<div class="flex flex-col gap-2">
<label class="text-sm font-medium text-text-secondary">Notes</label>
<textarea class="w-full bg-[#2c2c2e] border border-transparent rounded-lg px-4 py-3 text-white placeholder-text-secondary focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all min-h-[120px] resize-none" placeholder="Add details..."></textarea>
</div>
<!-- Date Picker Area -->
<div class="flex flex-col gap-2">
<label class="text-sm font-medium text-text-secondary">Due Date</label>
<div class="bg-[#2c2c2e] rounded-lg p-4 border border-transparent focus-within:ring-2 focus-within:ring-primary transition-all">
<!-- Calendar Header -->
<div class="flex items-center justify-between mb-4">
<button class="text-text-secondary hover:text-white p-1">
<span class="material-symbols-outlined text-xl">chevron_left</span>
</button>
<span class="font-medium">October 2023</span>
<button class="text-text-secondary hover:text-white p-1">
<span class="material-symbols-outlined text-xl">chevron_right</span>
</button>
</div>
<!-- Calendar Grid -->
<div class="grid grid-cols-7 gap-1 text-center">
<!-- Days of week -->
<div class="text-xs font-medium text-text-secondary py-2">S</div>
<div class="text-xs font-medium text-text-secondary py-2">M</div>
<div class="text-xs font-medium text-text-secondary py-2">T</div>
<div class="text-xs font-medium text-text-secondary py-2">W</div>
<div class="text-xs font-medium text-text-secondary py-2">T</div>
<div class="text-xs font-medium text-text-secondary py-2">F</div>
<div class="text-xs font-medium text-text-secondary py-2">S</div>
<!-- Dates (Simplified for example) -->
<button class="col-start-4 h-8 w-full rounded-md hover:bg-white/10 text-sm transition-colors flex items-center justify-center">1</button>
<button class="h-8 w-full rounded-md hover:bg-white/10 text-sm transition-colors flex items-center justify-center">2</button>
<button class="h-8 w-full rounded-md hover:bg-white/10 text-sm transition-colors flex items-center justify-center">3</button>
<button class="h-8 w-full rounded-md hover:bg-white/10 text-sm transition-colors flex items-center justify-center">4</button>
<button class="h-8 w-full rounded-md bg-primary text-white font-medium text-sm transition-colors flex items-center justify-center shadow-[0_0_10px_rgba(10,132,255,0.4)]">5</button>
<button class="h-8 w-full rounded-md hover:bg-white/10 text-sm transition-colors flex items-center justify-center">6</button>
<button class="h-8 w-full rounded-md hover:bg-white/10 text-sm transition-colors flex items-center justify-center">7</button>
<button class="h-8 w-full rounded-md hover:bg-white/10 text-sm transition-colors flex items-center justify-center">8</button>
<button class="h-8 w-full rounded-md hover:bg-white/10 text-sm transition-colors flex items-center justify-center">9</button>
<button class="h-8 w-full rounded-md hover:bg-white/10 text-sm transition-colors flex items-center justify-center">10</button>
<button class="h-8 w-full rounded-md hover:bg-white/10 text-sm transition-colors flex items-center justify-center">11</button>
<button class="h-8 w-full rounded-md hover:bg-white/10 text-sm transition-colors flex items-center justify-center">12</button>
<button class="h-8 w-full rounded-md hover:bg-white/10 text-sm transition-colors flex items-center justify-center">13</button>
<button class="h-8 w-full rounded-md hover:bg-white/10 text-sm transition-colors flex items-center justify-center">14</button>
</div>
</div>
</div>
</div>
<!-- Footer Actions -->
<div class="px-6 py-4 bg-[#2c2c2e]/50 border-t border-border-dark flex justify-end gap-3">
<button class="px-5 py-2.5 rounded-lg text-sm font-medium hover:bg-white/5 transition-colors">
                    Cancel
                </button>
<button class="px-5 py-2.5 rounded-lg bg-primary text-white text-sm font-medium hover:bg-primary/90 transition-colors shadow-sm">
                    Save Changes
                </button>
</div>
</div>
</div>
</body></html>
