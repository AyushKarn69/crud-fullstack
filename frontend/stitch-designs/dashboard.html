<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Tasks Dashboard - Animated States</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0A84FF",
                        "dark-charcoal": "#0f0f0f",
                        "card-bg": "#1c1c1e",
                    },
                    fontFamily: {
                        "sans": ["Inter", "SF Pro Display", "-apple-system", "BlinkMacSystemFont", "Segoe UI", "Roboto", "Helvetica", "Arial", "sans-serif"],
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                    animation: {
                        'glow': 'glow 2s ease-in-out infinite alternate',
                        'slide-in-trail': 'slideInTrail 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'fade-in-list': 'fadeInList 1.2s ease-out forwards',
                    },
                    keyframes: {
                        glow: {
                            '0%': { boxShadow: '0 0 5px rgba(10, 132, 255, 0.2)' },
                            '100%': { boxShadow: '0 0 20px rgba(10, 132, 255, 0.5)' },
                        },
                        slideInTrail: {
                            '0%': { transform: 'translateX(-50px)', opacity: '0' },
                            '100%': { transform: 'translateX(0)', opacity: '1' },
                        },
                        fadeInList: {
                            '0%': { opacity: '0', transform: 'translateY(10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        @layer base {
            body {
                @apply bg-dark-charcoal text-slate-100 antialiased;
            }
        }.trail-effect {
            position: relative;
        }
        .trail-effect::before {
            content: '';
            position: absolute;
            left: -20px;
            top: 0;
            bottom: 0;
            width: 40px;
            background: linear-gradient(90deg, rgba(10, 132, 255, 0.1) 0%, transparent 100%);
            z-index: -1;
            filter: blur(8px);
        }.task-checkbox:checked {
            background-image: url("data:image/svg+xml,%3csvg viewBox='0 0 16 16' fill='white' xmlns='http://www.w3.org/2000/svg'%3e%3cpath d='M12.207 4.793a1 1 0 010 1.414l-5 5a1 1 0 01-1.414 0l-2-2a1 1 0 011.414-1.414L6.5 9.086l4.293-4.293a1 1 0 011.414 0z'/%3e%3c/svg%3e");
            background-size: 100% 100%;
            background-position: center;
            background-repeat: no-repeat;
        }
    </style>
</head>
<body class="min-h-screen selection:bg-primary/30">
<div class="mx-auto max-w-3xl px-6 py-12 md:py-20 flex flex-col gap-10">
<header class="flex items-center justify-between pb-6 border-b border-white/5">
<div class="flex items-center gap-3">
<div class="flex items-center justify-center size-10 rounded-xl bg-primary/10 text-primary">
<span class="material-symbols-outlined text-2xl font-bold">check_circle</span>
</div>
<h1 class="text-3xl font-bold tracking-tight">Tasks</h1>
</div>
<div class="flex items-center gap-4">
<button class="text-slate-400 hover:text-slate-100 transition-colors p-2 rounded-full hover:bg-white/5">
<span class="material-symbols-outlined">search</span>
</button>
<div class="bg-center bg-no-repeat aspect-square bg-cover rounded-full size-10 border border-white/10" data-alt="User profile" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuC3G_5tQp-PoAb6PYi24M3_RdC3RtCF-owagA2zDQSJQo45M-junlIUS4R-bQm3bqTEt3gLlDsLyyqLIRrrwHNog3MeF9XUQLMqZCe9ZQDSvxAY379tCb0NK1ytghDpraNzQY_fxt48dpkM-9AtEg6IuLzkPYLkNE-WWXKnzITtjtBtneXs6zdOgJlpWdSSrfKi-U4fBlKbULxTdiM1ss8vS6n26uYpB7ZNuwurBldepePrvdHzkyMW8_vME5Fa4MPWX77O4SqaSA");'></div>
</div>
</header>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none z-10">
<span class="material-symbols-outlined text-slate-500 group-focus-within:text-primary transition-colors">add</span>
</div>
<input class="w-full bg-white/5 border border-white/10 rounded-xl pl-14 pr-24 py-5 text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-primary/40 focus:border-primary/50 backdrop-blur-md transition-all shadow-sm text-lg animate-glow" placeholder="Add a task..." type="text"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 bg-primary text-white px-5 py-2 rounded-lg font-semibold text-sm transition-transform duration-200 hover:scale-105 active:scale-95 shadow-lg shadow-primary/20">
                Add
            </button>
</div>
<div class="relative">
<div class="flex flex-col gap-3 animate-fade-in-list">
<div class="group relative flex items-center justify-between bg-card-bg border border-white/5 hover:border-white/10 rounded-2xl p-5 transition-all duration-300 shadow-sm animate-slide-in-trail trail-effect">
<div class="flex items-center gap-4 flex-1 overflow-hidden">
<div class="flex size-6 shrink-0 items-center justify-center">
<input class="task-checkbox h-6 w-6 rounded-full border-white/20 bg-white/5 text-primary focus:ring-0 focus:ring-offset-0 transition-all cursor-pointer checked:border-primary checked:bg-primary" type="checkbox"/>
</div>
<div class="flex flex-col justify-center min-w-0">
<p class="text-slate-100 text-lg font-medium leading-snug truncate">Review quarterly goals</p>
<p class="text-primary text-sm font-medium leading-normal mt-0.5">Today, 10:00 AM</p>
</div>
</div>
<div class="flex items-center gap-2 opacity-0 group-hover:opacity-100 transition-opacity shrink-0 pl-4">
<button class="p-2 text-slate-400 hover:text-slate-100 hover:bg-white/10 rounded-lg transition-colors">
<span class="material-symbols-outlined text-[20px]">edit</span>
</button>
<button class="p-2 text-slate-400 hover:text-red-400 hover:bg-red-400/10 rounded-lg transition-colors">
<span class="material-symbols-outlined text-[20px]">delete</span>
</button>
</div>
</div>
<div class="group flex items-center justify-between bg-card-bg border border-white/5 hover:border-white/10 rounded-2xl p-5 transition-all duration-300 shadow-sm">
<div class="flex items-center gap-4 flex-1 overflow-hidden">
<div class="flex size-6 shrink-0 items-center justify-center">
<input class="task-checkbox h-6 w-6 rounded-full border-white/20 bg-white/5 text-primary focus:ring-0 focus:ring-offset-0 transition-all cursor-pointer checked:border-primary checked:bg-primary" type="checkbox"/>
</div>
<div class="flex flex-col justify-center min-w-0">
<p class="text-slate-100 text-lg font-medium leading-snug truncate">Call client regarding project updates</p>
<p class="text-slate-500 text-sm font-normal leading-normal mt-0.5">Today, 2:30 PM</p>
</div>
</div>
<div class="flex items-center gap-2 opacity-0 group-hover:opacity-100 transition-opacity shrink-0 pl-4">
<button class="p-2 text-slate-400 hover:text-slate-100 hover:bg-white/10 rounded-lg transition-colors">
<span class="material-symbols-outlined text-[20px]">edit</span>
</button>
<button class="p-2 text-slate-400 hover:text-red-400 hover:bg-red-400/10 rounded-lg transition-colors">
<span class="material-symbols-outlined text-[20px]">delete</span>
</button>
</div>
</div>
<div class="group flex items-center justify-between bg-card-bg border border-white/5 hover:border-white/10 rounded-2xl p-5 transition-all duration-300 shadow-sm">
<div class="flex items-center gap-4 flex-1 overflow-hidden">
<div class="flex size-6 shrink-0 items-center justify-center">
<input class="task-checkbox h-6 w-6 rounded-full border-white/20 bg-white/5 text-primary focus:ring-0 focus:ring-offset-0 transition-all cursor-pointer checked:border-primary checked:bg-primary" type="checkbox"/>
</div>
<div class="flex flex-col justify-center min-w-0">
<p class="text-slate-100 text-lg font-medium leading-snug truncate">Prepare slides for team meeting</p>
<p class="text-slate-500 text-sm font-normal leading-normal mt-0.5">Tomorrow, 9:00 AM</p>
</div>
</div>
<div class="flex items-center gap-2 opacity-0 group-hover:opacity-100 transition-opacity shrink-0 pl-4">
<button class="p-2 text-slate-400 hover:text-slate-100 hover:bg-white/10 rounded-lg transition-colors">
<span class="material-symbols-outlined text-[20px]">edit</span>
</button>
<button class="p-2 text-slate-400 hover:text-red-400 hover:bg-red-400/10 rounded-lg transition-colors">
<span class="material-symbols-outlined text-[20px]">delete</span>
</button>
</div>
</div>
<div class="flex items-center gap-4 my-6">
<div class="h-px bg-white/10 flex-1"></div>
<span class="text-xs font-bold text-slate-500 uppercase tracking-[0.2em]">Completed</span>
<div class="h-px bg-white/10 flex-1"></div>
</div>
<div class="group flex items-center justify-between bg-white/[0.01] border border-transparent rounded-2xl p-5 transition-all duration-300 opacity-40 hover:opacity-70">
<div class="flex items-center gap-4 flex-1 overflow-hidden">
<div class="flex size-6 shrink-0 items-center justify-center">
<input checked="" class="task-checkbox h-6 w-6 rounded-full border-primary bg-primary text-primary focus:ring-0 focus:ring-offset-0 cursor-pointer" type="checkbox"/>
</div>
<div class="flex flex-col justify-center min-w-0">
<p class="text-slate-400 line-through text-lg font-medium leading-snug truncate">Update dependency packages</p>
<p class="text-slate-600 text-sm font-normal leading-normal mt-0.5">Yesterday</p>
</div>
</div>
<div class="flex items-center gap-2 opacity-0 group-hover:opacity-100 transition-opacity shrink-0 pl-4">
<button class="p-2 text-slate-400 hover:text-red-400 hover:bg-red-400/10 rounded-lg transition-colors">
<span class="material-symbols-outlined text-[20px]">delete</span>
</button>
</div>
</div>
</div>
<div class="absolute inset-x-0 -bottom-10 h-20 bg-gradient-to-t from-dark-charcoal to-transparent pointer-events-none"></div>
</div>
</div>

</body></html>
